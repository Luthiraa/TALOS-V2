# Tiny Tapeout project information
project:
  title:        "Talos V2 Sampler Probe"
  author:       "Luthiraa"
  discord:      ""
  description:  "Tiny Tapeout wrapper around the Talos V2 RTL categorical sampler."
  language:     "Verilog"
  clock_hz:     1000000
  tiles:        "2x2"
  top_module:   "tt_um_luthiraa_talos_v2_sampler"
  source_files:
    - "tt_um_luthiraa_talos_v2_sampler.v"
    - "microgpt_categorical_sampler.v"

pinout:
  ui[0]: "rng seed bit 0"
  ui[1]: "rng seed bit 1"
  ui[2]: "rng seed bit 2"
  ui[3]: "rng seed bit 3"
  ui[4]: "rng seed bit 4"
  ui[5]: "rng seed bit 5"
  ui[6]: "rng seed bit 6"
  ui[7]: "start"

  uo[0]: "next token bit 0"
  uo[1]: "next token bit 1"
  uo[2]: "next token bit 2"
  uo[3]: "next token bit 3"
  uo[4]: "next token bit 4"
  uo[5]: "sampler busy"
  uo[6]: "sampler done"
  uo[7]: "argmax token LSB"

  uio[0]: "temperature bit 0"
  uio[1]: "temperature bit 1"
  uio[2]: "temperature bit 2"
  uio[3]: "temperature bit 3"
  uio[4]: "temperature bit 4"
  uio[5]: "temperature bit 5"
  uio[6]: "temperature bit 6"
  uio[7]: "temperature bit 7"

yaml_version: 6
